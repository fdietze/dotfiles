# prefix like screen
set -g prefix C-a
bind C-a send-prefix
unbind C-b
bind-key C-a last-window

# fix slow esc in vim
set -sg escape-time 0

# forward modified keys (Shift/Ctrl+Enter etc) in CSI-u format so TUIs like pi
# can distinguish them from plain Enter. csi-u needs tmux >= 3.5.
set -g extended-keys on
set -g extended-keys-format csi-u

# truecolor: tmux-256color terminfo + RGB passthrough to the outer terminal
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

# 1-based indexing, renumber on close so window numbers stay gapless
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# let programs (vim) see focus events for autoread/cursor restore
set -g focus-events on

# window title from active program
set -g set-titles on
set -g set-titles-string "#T"

# mouse + visual bell on activity
set -g mouse on
set -g visual-activity on

# scrollback
set -g history-limit 10000

# vi copy mode; v select, y copy. Clipboard via OSC52 so the outer terminal
# owns the system clipboard (works on X11, Wayland, and over SSH; no tools).
setw -g mode-keys vi
set -g set-clipboard on
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

# splits: | horizontal, - vertical
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# move current window to first slot
bind T swap-window -t 1

# vim keys: select panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vim keys: switch windows
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# vim keys: resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# 24h clock
setw -g clock-mode-style 24

# status bar: hostname left; session, date, time right.
# native formats only (no subprocess), refreshed every 5s to allow deep-sleep.
set -g status on
set -g status-interval 5
set -g status-left-length 20
set -g status-left "#[fg=yellow,bold]#h "
set -g status-right-length 60
set -g status-right "#[fg=yellow,bold]#S#[fg=white,nobold] | %d %b %Y  %H:%M"

# colours: ANSI names only, so the active terminal palette / theme drives them
set -g status-style "bg=black,fg=yellow"
setw -g window-status-current-style "fg=brightred"
set -g pane-border-style "fg=black"
set -g pane-active-border-style "fg=brightgreen"
set -g message-style "bg=black,fg=brightred"
set -g display-panes-active-colour blue
set -g display-panes-colour brightred
setw -g clock-mode-colour green
