# Pass-through mapping from noctalia's flattened terminal_* tokens to
# alacritty's color schema. Works with any noctalia scheme that ships a
# `terminal` block (see Scripts/python/src/theming/lib/scheme.py
# inject_terminal_colors). Our Base16 scheme always provides one.

[colors.primary]
background = '#222436'
foreground = '#c8d3f5'

[colors.cursor]
text   = '#222436'
cursor = '#c8d3f5'

[colors.selection]
text       = '#c8d3f5'
background = '#2d3f76'

[colors.normal]
black   = '#222436'
red     = '#ff757f'
green   = '#c3e88d'
yellow  = '#ff966c'
blue    = '#82aaff'
magenta = '#c099ff'
cyan    = '#86e1fc'
white   = '#c8d3f5'

[colors.bright]
black   = '#636da6'
red     = '#ff757f'
green   = '#c3e88d'
yellow  = '#ffc777'
blue    = '#82aaff'
magenta = '#c099ff'
cyan    = '#86e1fc'
white   = '#c8d3f5'
