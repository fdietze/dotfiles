# Pass-through mapping from noctalia's flattened terminal_* tokens to
# alacritty's color schema. Works with any noctalia scheme that ships a
# `terminal` block (see Scripts/python/src/theming/lib/scheme.py
# inject_terminal_colors). Our Base16 scheme always provides one.

[colors.primary]
background = '#ffffff'
foreground = '#000000'

[colors.cursor]
text   = '#ffffff'
cursor = '#000000'

[colors.selection]
text       = '#000000'
background = '#999999'

[colors.normal]
black   = '#ffffff'
red     = '#ff0088'
green   = '#19af00'
yellow  = '#ff7e00'
blue    = '#0a94ff'
magenta = '#3b00cb'
cyan    = '#00cab2'
white   = '#000000'

[colors.bright]
black   = '#666666'
red     = '#ff0088'
green   = '#19af00'
yellow  = '#ffa34a'
blue    = '#0a94ff'
magenta = '#3b00cb'
cyan    = '#00cab2'
white   = '#000000'
