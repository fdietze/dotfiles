[config]

[templates]

# User-defined templates
# Add your custom templates below
# Example:
# [templates.myapp]
# input_path = "~/.config/noctalia/templates/myapp.css"
# output_path = "~/.config/myapp/theme.css"
# post_hook = "myapp --reload-theme"

[templates.alacritty]
input_path  = "/home/felix/projects/dotfiles/home/noctalia/templates/alacritty.toml"
output_path = "/home/felix/.config/noctalia/generated/alacritty-colors.toml"
post_hook   = ""

# Fires noctalia-retint-nvim on every scheme/dark-mode change so running
# Neovim instances pick up the new colorscheme via nvr. The rendered output
# is just a one-line trigger; the real work happens in the post_hook script
# (generated by modules/home-manager/nvf.nix, installed at ~/bin/...).
[templates.nvim-trigger]
input_path  = "/home/felix/projects/dotfiles/home/noctalia/templates/nvim-trigger.toml"
output_path = "/home/felix/.config/noctalia/generated/nvim-trigger.txt"
post_hook   = "/home/felix/bin/noctalia-retint-nvim"

