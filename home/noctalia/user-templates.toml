[config]

[templates]

# User-defined templates
# Add your custom templates below
# Example:
# [templates.myapp]
# input_path = "~/.config/noctalia/templates/myapp.css"
# output_path = "~/.config/myapp/theme.css"
# post_hook = "myapp --reload-theme"

[templates.alacritty]
input_path  = "/home/felix/projects/dotfiles/home/noctalia/templates/alacritty.toml"
output_path = "/home/felix/.config/noctalia/generated/alacritty-colors.toml"
post_hook   = ""

[templates.wezterm]
input_path  = "/home/felix/projects/dotfiles/home/noctalia/templates/wezterm-colors.lua"
output_path = "/home/felix/.config/noctalia/generated/wezterm-colors.lua"
post_hook   = ""

# kitty's `auto_reload_config` (poll interval in seconds, set in
# modules/home-manager/shared.nix) only watches kitty.conf itself, not files
# brought in via `include`. SIGUSR1 forces a full config re-read in all
# running kitty windows. Process comm is `.kitty-wrapped` under the nix
# wrapper (not plain `kitty`), so match that exactly. `|| true` keeps the
# hook clean when no kitty is running.
[templates.kitty]
input_path  = "/home/felix/projects/dotfiles/home/noctalia/templates/kitty-colors.conf"
output_path = "/home/felix/.config/noctalia/generated/kitty-colors.conf"
post_hook   = "pkill -SIGUSR1 -x .kitty-wrapped 2>/dev/null || true"

# Fires noctalia-retint-nvim on every scheme/dark-mode change so running
# Neovim instances pick up the new colorscheme via nvr. The rendered output
# is just a one-line trigger; the real work happens in the post_hook script
# (generated by modules/home-manager/nvf.nix, installed at ~/bin/...).
[templates.nvim-trigger]
input_path  = "/home/felix/projects/dotfiles/home/noctalia/templates/nvim-trigger.toml"
output_path = "/home/felix/.config/noctalia/generated/nvim-trigger.txt"
post_hook   = "/home/felix/bin/noctalia-retint-nvim"

# Drives niri's focus-ring/border/shadow/tab-indicator colors from noctalia's
# active scheme. The template is a copy of noctalia's stock niri.kdl
# (Assets/Templates/niri.kdl) — kept in-repo so it can carry a runtime-generated
# header. niri's config.kdl includes this file at the top level; niri auto-
# watches included files for changes, so the post_hook is just a no-op load
# trigger to keep behaviour consistent across noctalia template targets.
[templates.niri]
input_path  = "/home/felix/projects/dotfiles/home/noctalia/templates/niri.kdl"
output_path = "/home/felix/.config/noctalia/generated/niri.kdl"
post_hook   = "niri msg action load-config-file 2>/dev/null || true"

