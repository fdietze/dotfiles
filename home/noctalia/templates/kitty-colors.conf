# pi-terminal-theme "terminal-tinted" custom palette slots 16..23. Pi emits these
# as xterm-256 indices (\e[48;5;Nm / \e[38;5;Nm) for its message/tool backgrounds
# (16-21) and tool title/output text (22-23). Without these, kitty falls back to
# the built-in xterm 256-color cube (16=#000000, 17-21=harsh blues) — the
# unreadable backgrounds the package README warns about.
#
# Slot -> noctalia token (all tokens are derived per active light/dark mode, so
# regenerating this file on a theme switch keeps the tints mode-correct):
#   16 selectedBg      surface_container_high  (neutral highlight)
#   17 toolErrorBg     error_container         (status hue from active scheme)
#   18 toolSuccessBg   primary_container
#   19 toolPendingBg   tertiary_container
#   20 userMessageBg   surface_container       (neutral)
#   21 customMessageBg secondary_container
#   22 toolTitle       on_surface              (main fg)
#   23 toolOutput      on_surface_variant      (muted body text)
# Backgrounds use the MD3 *_container tokens RAW (no filters). pi paints the whole
# tool block (title+args+output) with the status bg, so the title/output text must
# read on it: in dark mode the containers are dark and the on_surface text is light;
# in light mode the containers are light and the text is dark — both readable.
# Do NOT darken/desaturate them: wallpaper-derived schemes (the active source here is
# `wallpaper m3-rainbow`) already produce very dark, low-chroma containers (L~0.16),
# so even a small `darken` collapses them to black. makeContainerDark clamps to
# L>=0.15, so the raw containers are never pure black. on_surface (not a colored
# accent) is the only title color that stays legible on every container in BOTH modes.
# noctalia template-engine filters (darken/desaturate/...) exist if ever needed:
# src/theme/template_engine.cpp, args in percent.
color16 {{colors.surface_container_high.default.hex}}
color17 {{colors.error_container.default.hex}}
color18 {{colors.primary_container.default.hex}}
color19 {{colors.tertiary_container.default.hex}}
color20 {{colors.surface_container.default.hex}}
color21 {{colors.secondary_container.default.hex}}
color22 {{colors.on_surface.default.hex}}
color23 {{colors.on_surface_variant.default.hex}}
