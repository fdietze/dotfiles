# pi-terminal-theme "terminal-tinted" custom palette slots 16..23. Pi emits these
# as xterm-256 indices (\e[48;5;Nm / \e[38;5;Nm) for its message/tool backgrounds
# (16-21) and tool title/output text (22-23). Without these, kitty falls back to
# the built-in xterm 256-color cube (16=#000000, 17-21=harsh blues) — the
# unreadable backgrounds the package README warns about.
#
# Slot -> noctalia token (all tokens are derived per active light/dark mode, so
# regenerating this file on a theme switch keeps the tints mode-correct):
#   16 selectedBg      surface_container_high  (neutral highlight)
#   17 toolErrorBg     surface_container_high tinted red    (set_hue 2)
#   18 toolSuccessBg   surface_container_high tinted green  (set_hue 135)
#   19 toolPendingBg   surface_container_high tinted blue   (set_hue 222)
#   20 userMessageBg   surface_container       (neutral)
#   21 customMessageBg surface_container_high tinted magenta (set_hue 300)
#   22 toolTitle       on_surface              (main fg)
#   23 toolOutput      on_surface_variant      (muted body text)
# pi paints the whole tool block (title+args+output) with the status bg, so the
# title/output text must read on it.
#
# Status backgrounds (17/18/19/21): take surface_container_high and stamp a FIXED
# semantic hue (`set_saturation 30 | set_hue H`). Rationale (this took several wrong
# turns, documented so nobody repeats them):
#  - The MD3 *_container tokens are the obvious source but unusable here: their
#    lightness swings wildly by scheme. base16's accents are light pastels, so its
#    containers are vivid L~0.4 mid-tones (too loud, the screenshot complaint);
#    wallpaper schemes (`wallpaper m3-rainbow`) have dark accents, so containers are
#    L~0.16. No constant filter fixes both: any `darken`/`auto_lightness` strong
#    enough to dim base16 collapses the wallpaper greens to #000000, and auto_lightness
#    pushes already-extreme wallpaper containers to pure black/white.
#  - surface_container_high instead has the RIGHT lightness in every scheme and mode
#    by construction: a dim-dark surface in dark mode, a light surface in light mode,
#    never near-black or near-white. Stamping a fixed hue on it yields a consistent
#    DIM tint (dark in dark, light in light = the user's definition of "dim") that is
#    readable with the on_surface/on_surface_variant text in both modes.
#  - set_saturation+set_hue (not the scheme accent / not `blend`, which needs a
#    literal #hex it can't get from a live token). Fixed hues also make status colors
#    stable regardless of wallpaper: error always reads red, success always green.
#  - ORDER MATTERS: set_saturation BEFORE set_hue. On a greyscale surface (S=0) the
#    hue is undefined, so set_hue alone is a no-op; raise saturation first, then rotate.
# Filters: noctalia template engine, src/theme/template_engine.cpp (set_saturation
# arg is percent/100; set_hue arg is degrees).
color16 {{colors.surface_container_high.default.hex}}
color17 {{colors.surface_container_high.default.hex | set_saturation 30 | set_hue 2}}
color18 {{colors.surface_container_high.default.hex | set_saturation 30 | set_hue 135}}
color19 {{colors.surface_container_high.default.hex | set_saturation 30 | set_hue 222}}
color20 {{colors.surface_container.default.hex}}
color21 {{colors.surface_container_high.default.hex | set_saturation 30 | set_hue 300}}
color22 {{colors.on_surface.default.hex}}
color23 {{colors.on_surface_variant.default.hex}}
