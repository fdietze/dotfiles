# pi-terminal-theme "terminal-tinted" custom palette slots 16..23. Pi emits these
# as xterm-256 indices (\e[48;5;Nm / \e[38;5;Nm) for its message/tool backgrounds
# (16-21) and tool title/output text (22-23). Without these, kitty falls back to
# the built-in xterm 256-color cube (16=#000000, 17-21=harsh blues) — the
# unreadable backgrounds the package README warns about.
#
# Slot -> noctalia token (all tokens are derived per active light/dark mode, so
# regenerating this file on a theme switch keeps the tints mode-correct):
#   16 selectedBg     surface_container_high  (neutral highlight)
#   17 toolErrorBg    error_container         (red)
#   18 toolSuccessBg  primary_container       (primary is green)
#   19 toolPendingBg  tertiary_container      (blue = running/active)
#   20 userMessageBg  surface_container       (neutral)
#   21 customMessageBg secondary_container    (magenta, matches the magenta label)
#   22 toolTitle      on_surface             (main fg; readable on every tint in BOTH modes — a blue/accent title is unreadable on the light-mode tints, and pi paints the whole tool block (title+args+output) with the status bg)
#   23 toolOutput     on_surface_variant     (muted body text)
# Status backgrounds (17/18/19/21) are the MD3 *_container tokens nudged with
# `darken 20 | desaturate 25`: the raw containers are too light/saturated and the
# light toolOutput/title text fails contrast on them; darkening+desaturating turns
# them into subtle dark tints (dark mode) / soft tints (light mode) that stay
# readable. Filters run in noctalia's template engine (src/theme/template_engine.cpp;
# args are percent, divided by 100).
color16 {{colors.surface_container_high.default.hex}}
color17 {{colors.error_container.default.hex | darken 20 | desaturate 25}}
color18 {{colors.primary_container.default.hex | darken 20 | desaturate 25}}
color19 {{colors.tertiary_container.default.hex | darken 20 | desaturate 25}}
color20 {{colors.surface_container.default.hex}}
color21 {{colors.secondary_container.default.hex | darken 20 | desaturate 25}}
color22 {{colors.on_surface.default.hex}}
color23 {{colors.on_surface_variant.default.hex}}
