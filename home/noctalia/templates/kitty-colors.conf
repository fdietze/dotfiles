# pi-terminal-theme "terminal-tinted" custom palette slots 16..23. Pi emits these
# as xterm-256 indices (\e[48;5;Nm / \e[38;5;Nm) for its message/tool backgrounds
# (16-21) and tool title/output text (22-23). Without these, kitty falls back to
# the built-in xterm 256-color cube (16=#000000, 17-21=harsh blues) — the
# unreadable backgrounds the package README warns about.
#
# Slot -> noctalia token (all tokens are derived per active light/dark mode, so
# regenerating this file on a theme switch keeps the tints mode-correct):
#   16 selectedBg      surface_container_high  (neutral highlight)
#   17 toolErrorBg     error_container         (status hue from active scheme)
#   18 toolSuccessBg   primary_container
#   19 toolPendingBg   tertiary_container
#   20 userMessageBg   surface_container       (neutral)
#   21 customMessageBg secondary_container
#   22 toolTitle       on_surface              (main fg)
#   23 toolOutput      on_surface_variant      (muted body text)
# Status backgrounds (17/18/19/21) are the MD3 *_container tokens with `desaturate 35`.
# pi paints the whole tool block (title+args+output) with the status bg, so the
# title/output text must read on it: dark mode -> dark containers + light on_surface
# text; light mode -> light containers + dark text. Both readable.
#
# Why `desaturate 35` and NOT `darken`: the container lightness swings by scheme.
# base16's dark accents are light pastels, so makeContainerDark (L-0.35) yields VIVID
# mid-tones (L~0.4, S~1.0) that are far too loud on the near-black bg. Wallpaper
# schemes (e.g. `wallpaper m3-rainbow`) have dark accents, so their containers are
# already L~0.16. A `darken` big enough to tame base16 collapses the wallpaper ones
# to black; `desaturate` leaves lightness untouched, so it tames base16's vividness
# without ever blacking any scheme. (`blend` can't help: it needs a literal #hex
# target, not the live accent token.) on_surface (not a colored accent) is the only
# title color legible on every container in BOTH modes. Filters: noctalia template
# engine, src/theme/template_engine.cpp, args in percent.
color16 {{colors.surface_container_high.default.hex}}
color17 {{colors.error_container.default.hex | desaturate 35}}
color18 {{colors.primary_container.default.hex | desaturate 35}}
color19 {{colors.tertiary_container.default.hex | desaturate 35}}
color20 {{colors.surface_container.default.hex}}
color21 {{colors.secondary_container.default.hex | desaturate 35}}
color22 {{colors.on_surface.default.hex}}
color23 {{colors.on_surface_variant.default.hex}}
