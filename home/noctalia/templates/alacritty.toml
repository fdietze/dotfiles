# AUTOGENERATED at runtime by noctalia from home/noctalia/templates/alacritty.toml.
# Edits are overwritten on the next theme change.
#
# Pass-through mapping from noctalia's flattened terminal_* tokens to
# alacritty's color schema. Works with any noctalia scheme that ships a
# `terminal` block (see Scripts/python/src/theming/lib/scheme.py
# inject_terminal_colors). Our Base16 scheme always provides one.

[colors.primary]
background = '{{colors.terminal_background.default.hex}}'
foreground = '{{colors.terminal_foreground.default.hex}}'

[colors.cursor]
text   = '{{colors.terminal_cursor_text.default.hex}}'
cursor = '{{colors.terminal_cursor.default.hex}}'

[colors.selection]
text       = '{{colors.terminal_selection_fg.default.hex}}'
background = '{{colors.terminal_selection_bg.default.hex}}'

[colors.normal]
black   = '{{colors.terminal_normal_black.default.hex}}'
red     = '{{colors.terminal_normal_red.default.hex}}'
green   = '{{colors.terminal_normal_green.default.hex}}'
yellow  = '{{colors.terminal_normal_yellow.default.hex}}'
blue    = '{{colors.terminal_normal_blue.default.hex}}'
magenta = '{{colors.terminal_normal_magenta.default.hex}}'
cyan    = '{{colors.terminal_normal_cyan.default.hex}}'
white   = '{{colors.terminal_normal_white.default.hex}}'

# pi-terminal-theme "terminal-tinted" custom palette slots 16..23 (full slot->token
# rationale in kitty-colors.conf). Status backgrounds 17/18/19/21 are
# surface_container_high stamped with a fixed semantic hue (set_saturation 30 |
# set_hue H): the MD3 *_container tokens vary too much in lightness across schemes
# (vivid for base16, near-black for wallpaper schemes), so they're replaced by a dim
# mode-correct surface + fixed hue. 22 uses on_surface so the title stays readable.
[[colors.indexed_colors]]
index = 16
color = '{{colors.surface_container_high.default.hex}}'
[[colors.indexed_colors]]
index = 17
color = '{{colors.surface_container_high.default.hex | set_saturation 30 | set_hue 2}}'
[[colors.indexed_colors]]
index = 18
color = '{{colors.surface_container_high.default.hex | set_saturation 30 | set_hue 135}}'
[[colors.indexed_colors]]
index = 19
color = '{{colors.surface_container_high.default.hex | set_saturation 30 | set_hue 222}}'
[[colors.indexed_colors]]
index = 20
color = '{{colors.surface_container.default.hex}}'
[[colors.indexed_colors]]
index = 21
color = '{{colors.surface_container_high.default.hex | set_saturation 30 | set_hue 300}}'
[[colors.indexed_colors]]
index = 22
color = '{{colors.on_surface.default.hex}}'
[[colors.indexed_colors]]
index = 23
color = '{{colors.on_surface_variant.default.hex}}'

[colors.bright]
black   = '{{colors.terminal_bright_black.default.hex}}'
red     = '{{colors.terminal_bright_red.default.hex}}'
green   = '{{colors.terminal_bright_green.default.hex}}'
yellow  = '{{colors.terminal_bright_yellow.default.hex}}'
blue    = '{{colors.terminal_bright_blue.default.hex}}'
magenta = '{{colors.terminal_bright_magenta.default.hex}}'
cyan    = '{{colors.terminal_bright_cyan.default.hex}}'
white   = '{{colors.terminal_bright_white.default.hex}}'
