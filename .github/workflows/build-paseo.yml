# Builds the aarch64-linux paseo daemon/CLI (github:getpaseo/paseo, pinned in
# flake.lock) and pushes it to the fdietze cachix cache, so cubie substitutes the
# exact store path on `home-manager switch` (hosts-home/cubie.nix) instead of
# building it on the 1 GB SBC — where the TypeScript build OOMs (node code 134).
#
# Also builds the x86_64-linux paseo desktop app (Electron GUI) and pushes it
# to the same cache so gurke doesn't have to build it locally.
name: build-paseo

on:
  push:
    branches: [master]
    paths:
      - flake.lock
      - ci/paseo.nix
      - ci/paseo-desktop.nix
      - .github/workflows/build-paseo.yml
  workflow_dispatch:

concurrency:
  group: build-paseo
  cancel-in-progress: true

jobs:
  build-aarch64:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: cachix/cachix-action@v15
        with:
          name: fdietze
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipPush: true
      - name: Build paseo daemon (native aarch64)
        run: nix build --impure -L -f ci/paseo.nix -o result
      - name: Push paseo to cachix
        run: cachix push fdietze "$(readlink -f result)"

  build-x86_64-desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: cachix/cachix-action@v15
        with:
          name: fdietze
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipPush: true
      - name: Build paseo desktop app (x86_64-linux)
        run: nix build --impure -L -f ci/paseo-desktop.nix -o result
      - name: Push paseo desktop to cachix
        run: cachix push fdietze "$(readlink -f result)"
