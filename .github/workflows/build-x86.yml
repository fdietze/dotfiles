# Builds the x86_64-linux artifacts and pushes new paths to the fdietze cachix
# cache. gurke's full NixOS toplevel (subsumes the paseo desktop app, imported
# by gurke's home.nix) and the bumped proot.
#
# Both build SEQUENTIALLY in one job (one runner, one /nix/store).
#
# proot-bumped is pinned to system=x86_64-linux (Android NDK cross toolchain
# ships x86 host binaries) and cross-compiles the aarch64-android proot, so it
# must build here on x86. korken's ON-DEVICE switch substitutes this output from
# cachix (its home closure, pre-warmed by build-arm.yml, does not reference it,
# so there is no CI-time race — we just keep it in the cache for the device).
name: build-x86

on:
  push:
    branches: [master]
  workflow_dispatch:

# cancel-in-progress: false so a long in-flight gurke toplevel build is NOT
# pre-empted by a newer push. GitHub keeps the running build alive and holds the
# newest push as the single pending run (older pending runs are superseded), so
# the cache still converges to the latest commit without wasting a 30-40 min
# build. build-arm cancels instead (it finishes in ~2 min).
concurrency:
  group: build-x86
  cancel-in-progress: false

jobs:
  x86:
    runs-on: ubuntu-latest
    # gurke's toplevel is a large first-time build; generous headroom (the runner
    # died from disk exhaustion, not timeout, but keep slack once disk is freed).
    timeout-minutes: 150
    steps:
      # gurke's full toplevel closure (desktop + vscode + electron/noctalia) does
      # not fit on the runner's root disk (~21 GB free): the runner lost
      # communication mid-realization. The ephemeral resource disk at /mnt is
      # much larger (~65 GB free), so bind-mount the whole /nix tree onto it
      # before installing Nix. This holds both the store and the daemon build dir
      # (/nix/var), and is instant vs. deleting ~30 GB of preinstalled tooling.
      - name: Put /nix on the large /mnt disk
        run: |
          sudo mkdir -p /mnt/nix /nix
          sudo mount --bind /mnt/nix /nix
      # gurke's toplevel builds codex (Rust) and noctalia (Qt) from source, whose
      # peak memory exceeds the runner's 7 GB RAM (OOM → "lost communication").
      # A large swapfile on the roomy /mnt disk lets those spikes spill to disk
      # instead of being OOM-killed. Sized generously (24G) so the build can keep
      # full parallelism (fast ~90 min) rather than serializing (--max-jobs 1 was
      # OOM-safe but hit the 150 min timeout). Replaces the runner's small default
      # swap.
      - name: Add 24G swap on the resource disk
        run: |
          sudo swapoff -a || true
          sudo rm -f /mnt/swapfile
          sudo fallocate -l 24G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      # skipPush + explicit `cachix push` below: the automatic post-build-hook
      # does not reliably upload under the DeterminateSystems Nix daemon, so we
      # push the built closures explicitly (cachix skips paths already cached).
      - uses: cachix/cachix-action@v15
        with:
          name: fdietze
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipPush: true
      # --impure: ci/proot-bump.nix resolves flake inputs via builtins.getFlake
      # ($GITHUB_WORKSPACE). Same store path korken's prootStatic references.
      - name: Build bumped proot (x86 NDK cross -> aarch64-android)
        run: nix build -L --impure -f ci/proot-bump.nix -o result-proot
      - name: Push proot to cachix
        run: cachix push fdietze "$(readlink -f result-proot)"
      # Full parallelism for speed; the 24G swapfile above absorbs the peak RAM of
      # concurrent codex(Rust)+noctalia(Qt) compiles that OOMed the 7 GB runner.
      - name: Build gurke NixOS toplevel
        run: nix build -L .#nixosConfigurations.gurke.config.system.build.toplevel -o result-gurke
      - name: Push gurke closure to cachix
        run: cachix push fdietze "$(readlink -f result-gurke)"
