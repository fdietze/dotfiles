# Builds the full aarch64-linux closures of the two slow arm hosts and pushes
# every newly-built path to the fdietze cachix cache, so cubie (1 GB SBC) and
# korken (nix-on-droid) download-only on switch instead of building on-device.
# Building the whole closure subsumes the old per-package paseo-aarch64 build.
#
# Both hosts build SEQUENTIALLY in one job (one runner, one /nix/store): cubie
# and korken share most aarch64 paths, so the second build reuses the first's
# just-built store instead of rebuilding them on a separate parallel runner.
#
# Runs natively on ubuntu-24.04-arm (no QEMU).
#
# For korken we build its HOME-MANAGER closure, not the full nix-on-droid
# activationPackage. The full generation references nix-on-droid's default
# `environment.files.prootStatic` — a readOnly builtins.storePath
# (7qd99…proot-termux-static-…-2024-05-04) that ships inside the Android app and
# exists in NO public cache, so a CI runner cannot realize it. On-device that
# path is already present (app-bundled) and the bumped proot (scf3d1a1, pushed
# by build-x86.yml) substitutes from cachix, so the cheap system-generation
# wrapper builds fine on `switch`. The heavy aarch64 packages korken actually
# builds (nvf/neovim, pi/claude agents) all live in the home closure — exactly
# what we pre-warm here.
name: build-arm

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: build-arm
  cancel-in-progress: true

jobs:
  arm:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      # Same extra substituters the hosts use (korken: hosts-nix-on-droid/korken.nix)
      # so CI substitutes the llm-agents (codex on cubie etc., cache.numtide.com)
      # instead of compiling them from source.
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            extra-substituters = https://noctalia.cachix.org https://cache.numtide.com
            extra-trusted-public-keys = noctalia.cachix.org-1:pCOR47nnMEo5thcxNDtzWpOxNFQsBRglJzxWPp3dkU4= niks3.numtide.com-1:DTx8wZduET09hRmMtKdQDxNNthLQETkc/yaX7M4qK0g=
      # skipPush + explicit `cachix push` below: the automatic post-build-hook
      # does not reliably upload under the DeterminateSystems Nix daemon, so we
      # push the built closures explicitly (cachix skips paths already cached).
      - uses: cachix/cachix-action@v15
        with:
          name: fdietze
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipPush: true
      - name: Build cubie home-manager closure (native aarch64)
        run: nix build -L .#homeConfigurations.cubie.activationPackage -o result-cubie
      - name: Push cubie closure to cachix
        run: cachix push fdietze "$(readlink -f result-cubie)"
      # --impure: nix-on-droid evaluates builtins.storePath (rejected in pure
      # mode). Reuses cubie's shared aarch64 store paths from the step above.
      - name: Build korken home-manager closure (native aarch64)
        run: nix build -L --impure .#nixOnDroidConfigurations.korken.config.home-manager.config.home.activationPackage -o result-korken
      - name: Push korken closure to cachix
        run: cachix push fdietze "$(readlink -f result-korken)"
